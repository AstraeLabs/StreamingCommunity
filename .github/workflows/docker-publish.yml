name: Build and Publish Docker image

on:
    push:
        branches:
            - main
            - dev

permissions:
    contents: read
    packages: write

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    check-version:
        runs-on: ubuntu-latest
        outputs:
            tag_name: ${{ steps.info.outputs.tag_name }}
        steps:
            - name: Check commit message for version
              id: info
              run: |
                  MSG="${{ github.event.head_commit.message }}"
                  VER=$(echo "$MSG" | grep -oE 'v[0-9]+\.[0-9]+([.][0-9]+)?' | head -1 || echo "")
                  echo "tag_name=$VER" >> $GITHUB_OUTPUT

    build-and-push:
        needs: check-version
        if: needs.check-version.outputs.tag_name != ''
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata (tags, labels)
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=latest
                      type=raw,value=${{ needs.check-version.outputs.tag_name }}

            - name: Build and push Docker image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  provenance: false
